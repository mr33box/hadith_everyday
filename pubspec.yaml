name: hadith_everyday
description: "Daily Hadith Wallpaper App - Automatically fetches and sets beautiful Hadith wallpapers every day"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # HTTP Client
  dio: ^5.4.0

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Background Tasks
  workmanager: ^0.9.0

  # File System
  path_provider: ^2.1.3

  # Permissions
  permission_handler: ^11.3.0

  # Localization
  intl: ^0.20.2

  # Navigation
  go_router: ^13.2.5

  # Typography
  google_fonts: ^6.2.1

  # Environment Variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  # Include the .env file as an asset
  assets:
    - .env
    - assets/hadiths.json
    - assets/icon.png

  # Enable localization generation
  generate: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
